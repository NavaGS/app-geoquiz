spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/geoquiz}
    username: ${POSTGRES_USER:geoquiz}
    password: ${POSTGRES_PASSWORD:geoquiz}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

frontend:
  origin: ${FRONTEND_ORIGIN:}

admin:
  token: ${ADMIN_TOKEN:dev}

geonames:
  username: ${GEONAMES_USERNAME:demo}

data:
  refresh:
    enabled: ${DATA_REFRESH_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    export:
      prometheus:
        enabled: true

server:
  port: ${PORT:8080}

logging:
  level:
    com.geoquiz: INFO
    org.springframework: WARN

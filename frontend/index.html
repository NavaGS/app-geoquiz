<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/globe.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>GeoQuiz — Test Your World Knowledge</title>
    <meta name="description" content="How well do you know the world? Test yourself with flags, interactive maps, capital cities, country shapes and more. Free to play, no sign-up needed." />

    <!-- Open Graph (Reddit, Discord, iMessage, Facebook) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://app-geoquiz.vercel.app/" />
    <meta property="og:title"       content="GeoQuiz — How Well Do You Know the World?" />
    <meta property="og:description" content="Test yourself with flags, interactive maps, capitals, country shapes and more. Free to play, no sign-up needed. Countdown mode for competitive play." />
    <meta property="og:image"       content="https://app-geoquiz.vercel.app/og-image.svg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name"   content="GeoQuiz" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="GeoQuiz — How Well Do You Know the World?" />
    <meta name="twitter:description" content="Test yourself with flags, interactive maps, capitals, country shapes and more. Free to play, no sign-up needed." />
    <meta name="twitter:image"       content="https://app-geoquiz.vercel.app/og-image.svg" />
    <script>
      (function() {
        var t = localStorage.getItem('gq_theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
